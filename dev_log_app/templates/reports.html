<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>日報一覧</title>

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">日報一覧</h1>

{% for r in reports %}

<div class="card mb-3 shadow-sm">

<div class="card-body">

<h5>{{ r[1] }}</h5>

<p><strong>今日やったこと</strong><br>{{ r[2] }}</p>

<p><strong>学んだこと</strong><br>{{ r[3] }}</p>

<p><strong>明日やること</strong><br>{{ r[4] }}</p>

<a href="/delete/{{ r[0] }}" class="btn btn-danger btn-sm">
削除
</a>

<a href="/edit/{{ r[0] }}" class="btn btn-warning btn-sm">
編集
</a>

</div>

</div>

{% endfor %}

<a href="/" class="btn btn-primary">戻る</a>

</div>

</body>
</html>
