<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>日報編集</title>

</head>

<body class="bg-light">

<div class="container mt-5">

<h1>日報編集</h1>

<form method="POST">

<div class="mb-3">

<label>今日やったこと</label>

<textarea name="task" class="form-control">{{ report[2] }}</textarea>

</div>

<div class="mb-3">

<label>学んだこと</label>

<textarea name="learned" class="form-control">{{ report[3] }}</textarea>

</div>

<div class="mb-3">

<label>明日やること</label>

<textarea name="tomorrow" class="form-control">{{ report[4] }}</textarea>

</div>

<button class="btn btn-primary">更新</button>

</form>

</div>

</body>

</html>
