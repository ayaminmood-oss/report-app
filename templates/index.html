<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>Dev Daily Log</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">Dev Daily Log</h1>

<div class="card p-4 shadow">

<h3 class="mb-3">作業タイマー</h3>

<div class="mb-4">

<p id="timer" style="font-size:30px;">0:0:0</p>

<button onclick="startTimer()" class="btn btn-success">
開始
</button>

<button onclick="stopTimer()" class="btn btn-danger">
終了
</button>

</div>

<form method="POST">

<div class="mb-3">
<label class="form-label">今日やったこと</label>
<textarea name="task" class="form-control"></textarea>
</div>

<div class="mb-3">
<label class="form-label">学んだこと</label>
<textarea name="learned" class="form-control"></textarea>
</div>

<div class="mb-3">
<label class="form-label">明日やること</label>
<textarea name="tomorrow" class="form-control"></textarea>
</div>

<button class="btn btn-primary">
保存
</button>

<a href="/dashboard" class="btn btn-success">
学習グラフ
</a>

</form>

</div>

</div>

</body>
</html>
